# CI for the BugWatch iOS SDK.
#
# The full build / test / publish pipeline (and any GitHub mirror) is
# configured when the BugWatch GitLab project and remotes are set up — a later
# milestone. For now this declares a Swift build + test job intended for a
# macOS runner.

stages:
  - test

build_and_test:
  stage: test
  tags:
    - macos
  script:
    - swift build
    - swift test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
